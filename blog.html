<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabo | Proyecto Blog</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Marked.js para convertir Markdown a HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        .blog-container {
            max-width: 900px;
            margin: 120px auto 50px auto;
            padding: 40px;
            background: var(--surface-color);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .blog-header {
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: white;
        }

        /* Estilos Markdown */
        #markdown-content h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #markdown-content h2 {
            font-size: 2rem;
            margin: 2rem 0 1rem;
            color: var(--text-main);
        }

        #markdown-content h3 {
            font-size: 1.5rem;
            margin: 1.5rem 0 1rem;
            color: #cbd5e1;
        }

        #markdown-content p {
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        #markdown-content ul, #markdown-content ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
            color: var(--text-muted);
            font-size: 1.15rem;
            line-height: 1.8;
        }

        #markdown-content li {
            margin-bottom: 0.5rem;
        }

        #markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 2rem 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: block;
        }

        #markdown-content strong {
            color: white;
        }
        
        #loading {
            text-align: center;
            font-size: 1.5rem;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <nav class="navbar">
        <div class="logo">Gabo<span>.Data</span></div>
        <div style="display: flex; align-items: center; gap: 2rem;">
            <ul class="nav-links">
                <li><a href="index.html#home" data-i18n="nav-home">Inicio</a></li>
                <li><a href="index.html#projects" data-i18n="nav-projects">Proyectos</a></li>
            </ul>
            <div class="lang-dropdown">
                <button class="lang-dropdown-trigger" id="langDropdownTrigger">
                    <img src="https://flagcdn.com/w40/mx.png" id="current-lang-flag" alt="Flag">
                    <span id="current-lang-text">ES</span>
                    <i class="fas fa-chevron-down" style="font-size: 0.8rem; margin-left: 0.2rem;"></i>
                </button>
                <div class="lang-dropdown-menu" id="langDropdownMenu">
                    <div class="lang-dropdown-item active" data-lang="es">
                        <img src="https://flagcdn.com/w40/mx.png" alt="MX"> <span>Español (MX)</span>
                    </div>
                    <div class="lang-dropdown-item" data-lang="en">
                        <img src="https://flagcdn.com/w40/us.png" alt="US"> <span>English (US)</span>
                    </div>
                    <div class="lang-dropdown-item" data-lang="pt">
                        <img src="https://flagcdn.com/w40/br.png" alt="BR"> <span>Português (BR)</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <article class="blog-container">
            <div class="blog-header">
                <a href="index.html#projects" class="back-btn" id="back-btn-text"><i class="fas fa-arrow-left"></i> Volver a Proyectos</a>
            </div>
            
            <div id="loading" data-i18n="blog-loading">Cargando proyecto... <i class="fas fa-spinner fa-spin"></i></div>
            <div id="markdown-content" style="display: none;"></div>
        </article>
    </div>

    <footer>
        <div class="container">
            <p style="color: #94a3b8; font-size: 0.9rem;" data-i18n="footer-copy">&copy; 2026 Gabo. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Cargar partículas
        if (typeof particlesJS !== 'undefined') {
            particlesJS("particles-js", {
                "particles": { "number": { "value": 60 }, "color": { "value": "#3b82f6" }, "opacity": { "value": 0.3 }, "size": { "value": 3, "random": true }, "line_linked": { "enable": true, "distance": 150, "color": "#8b5cf6", "opacity": 0.2, "width": 1 }, "move": { "enable": true, "speed": 1.5 } }
            });
        }

        // Traducciones básicas de la interfaz del Blog
        const blogTranslations = {
            es: {
                "nav-home": "Inicio",
                "nav-projects": "Proyectos",
                "blog-loading": "Cargando proyecto... <i class=\"fas fa-spinner fa-spin\"></i>",
                "blog-back": "<i class=\"fas fa-arrow-left\"></i> Volver a Proyectos",
                "blog-error": "Error cargando el proyecto: ",
                "footer-copy": "&copy; 2026 Gabo. Todos los derechos reservados."
            },
            en: {
                "nav-home": "Home",
                "nav-projects": "Projects",
                "blog-loading": "Loading project... <i class=\"fas fa-spinner fa-spin\"></i>",
                "blog-back": "<i class=\"fas fa-arrow-left\"></i> Back to Projects",
                "blog-error": "Error loading project: ",
                "footer-copy": "&copy; 2026 Gabo. All rights reserved."
            },
            pt: {
                "nav-home": "Início",
                "nav-projects": "Projetos",
                "blog-loading": "Carregando projeto... <i class=\"fas fa-spinner fa-spin\"></i>",
                "blog-back": "<i class=\"fas fa-arrow-left\"></i> Voltar para Projetos",
                "blog-error": "Erro ao carregar o projeto: ",
                "footer-copy": "&copy; 2026 Gabo. Todos os direitos reservados."
            }
        };

        // Lógica del Blog
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const basePostPath = urlParams.get('post');
            const markdownContainer = document.getElementById('markdown-content');
            const loading = document.getElementById('loading');
            const backBtnText = document.getElementById('back-btn-text');

            if (!basePostPath) {
                loading.textContent = "Error: No se especificó ningún proyecto a cargar.";
                return;
            }

            async function loadMarkdown(lang) {
                loading.style.display = 'block';
                markdownContainer.style.display = 'none';
                
                // Actualizar interfaz del blog
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (blogTranslations[lang] && blogTranslations[lang][key]) {
                        el.innerHTML = blogTranslations[lang][key];
                    }
                });
                backBtnText.innerHTML = blogTranslations[lang]["blog-back"];

                const postPath = `${basePostPath}_${lang}.md`;

                try {
                    const response = await fetch(postPath);
                    if (!response.ok) {
                        throw new Error("No se pudo cargar el archivo " + postPath);
                    }
                    
                    const markdownText = await response.text();
                    
                    // Extraer el directorio del archivo .md para ajustar las rutas de las imágenes
                    const basePath = postPath.substring(0, postPath.lastIndexOf('/') + 1);
                    
                    // Parsear Markdown
                    let htmlContent = marked.parse(markdownText);
                    
                    // Ajustar rutas de imágenes para que apunten a la carpeta correcta
                    htmlContent = htmlContent.replace(/<img src="([^"]+)"/g, (match, src) => {
                        if (!src.startsWith('http') && !src.startsWith('/')) {
                            // Decodificar la URL para manejar espacios (%20) correctamente
                            return `<img src="${basePath}${decodeURIComponent(src)}"`;
                        }
                        return match;
                    });

                    markdownContainer.innerHTML = htmlContent;
                    loading.style.display = 'none';
                    markdownContainer.style.display = 'block';
                } catch (error) {
                    loading.innerHTML = (blogTranslations[lang]["blog-error"] || "Error: ") + error.message;
                }
            }

            function setLanguage(lang) {
                localStorage.setItem('portfolio-lang', lang);
                
                // Flag URLs for current selection
                const flags = {
                    es: "https://flagcdn.com/w40/mx.png",
                    en: "https://flagcdn.com/w40/us.png",
                    pt: "https://flagcdn.com/w40/br.png"
                };

                // Update dropdown trigger elements
                const currentFlag = document.getElementById('current-lang-flag');
                const currentText = document.getElementById('current-lang-text');
                if (currentFlag) currentFlag.src = flags[lang];
                if (currentText) currentText.textContent = lang.toUpperCase();

                // Update active class on menu items
                document.querySelectorAll('.lang-dropdown-item').forEach(item => {
                    if (item.getAttribute('data-lang') === lang) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });

                loadMarkdown(lang);
            }

            // Toggle Dropdown Menu
            const trigger = document.getElementById('langDropdownTrigger');
            const menu = document.getElementById('langDropdownMenu');

            if (trigger && menu) {
                trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    menu.classList.toggle('show');
                });

                document.addEventListener('click', (e) => {
                    if (!trigger.contains(e.target) && !menu.contains(e.target)) {
                        menu.classList.remove('show');
                    }
                });
            }

            // Attach click listeners to language dropdown items
            document.querySelectorAll('.lang-dropdown-item').forEach(item => {
                item.addEventListener('click', () => {
                    const lang = item.getAttribute('data-lang');
                    setLanguage(lang);
                    if (menu) menu.classList.remove('show');
                });
            });

            // Inicializar con el idioma guardado o español
            const initialLang = localStorage.getItem('portfolio-lang') || 'es';
            setLanguage(initialLang);
        });
    </script>
</body>
</html>
